<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Left image section */
        .image-section {
            width: 50%;
            background-image: url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");
            background-size: cover;
            background-position: center;
        }

        /* Right signup section */
        .signup-section {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .signup-box {
            background: white;
            padding: 40px;
            width: 320px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        .signup-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .signup-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .signup-box button {
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .signup-box button:hover {
            background: #45a049;
        }

        .signup-box p {
            text-align: center;
            margin-top: 15px;
        }

        .signup-box a {
            color: #4CAF50;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="image-section"></div>

    <div class="signup-section">
        <div class="signup-box">
            <h2>Sign Up</h2>

            <form method="POST">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Create Account</button>
            </form>

            <p>
                Already have an account?
                <a href="/">Login</a>
            </p>
        </div>
    </div>

</div>

</body>
</html>
